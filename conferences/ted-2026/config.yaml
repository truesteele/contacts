# TED 2026 — Outdoorithm Collective Conference Networking Config
# This file parameterizes the entire conference networking toolkit pipeline.

conference:
  name: "TED 2026"
  slug: "ted-2026"
  dates: "April 14-18"
  venue: "Vancouver, BC"
  attendee_count: 1884
  connect_url_template: "https://connect.ted.com/attendees/{ted_id}"
  # Field prefix used in source data (e.g., ted_firstname, ted_lastname)
  field_prefix: "ted"
  # Attendee roles that get special badges
  roles:
    - field: "ted_is_speaker"
      label: "TED Speaker"
    - field: "ted_is_fellow"
      label: "TED Fellow"

