  model: "48-hour guided group camping trips where families across class/race lines build authentic connections"
  theory_of_change: "Cross-class friendships formed in nature are the #1 predictor of economic mobility"
  location: "Oakland, CA"
  color_primary: "#166534"
  color_accent: "#365314"
  color_dark: "#1a2e05"
  partnership_types:
    funding:
      label: "Funding"
      color_bg: "#dcfce7"
      color_fg: "#166534"
      description: "Philanthropists, foundation leaders, impact investors, CSR/ESG leaders, family offices, donor-advised fund holders"
    media_storytelling:
      label: "Media & Storytelling"
      color_bg: "#fef3c7"
      color_fg: "#92400e"
      description: "Filmmakers, journalists, content creators, media executives, authors, podcasters"
    programmatic:
      label: "Programmatic"
      color_bg: "#dbeafe"
      color_fg: "#1e40af"
      description: "Outdoor brands, national parks, public lands agencies, youth-serving nonprofits, wellness brands, education leaders"
    multiple:
      label: "Multiple"
      color_bg: "#fae8ff"
      color_fg: "#86198f"
    unlikely:
      label: "Unlikely"
      color_bg: "#f3f4f6"
      color_fg: "#6b7280"
